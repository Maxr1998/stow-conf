# vim: set filetype=swayconfig

# Setup workspace outputs [WIP]
set $primary_output "LG Electronics 27GN950 008NTXR1Q842"
set $secondary_output DisplayPort-1
workspace  1 output $primary_output
workspace  2 output $primary_output
workspace  8 output $secondary_output
workspace  9 output $secondary_output
workspace 10 output $secondary_output

# Set per-monitor settings
# Desktop
output "LG Electronics 27GN950 008NTXR1Q842" {
    scale 2
    pos 0 0
    #adaptive_sync on
}

# TV
output "LG Electronics LG TV SSCR2 0x01010101" {
    scale 2
    pos 1920 0
    mode 3840x2160@120Hz
    render_bit_depth 10
    hdr off
    #adaptive_sync on
}

# Laptop
output "BOE NE135A1M-NY1 Unknown" {
    scale 2
    pos 0 0
    adaptive_sync on
    subpixel rgb
}

# Office
output "Dell Inc. DELL S2722QC JLFNLD3" {
    scale 2
    pos -1920 0
    adaptive_sync on
    subpixel rgb
}

output "Dell Inc. DELL S2722QC 9JT3MD3" {
    scale 2
    pos -3000 -420
    transform 270
    adaptive_sync on
    subpixel rgb
}
